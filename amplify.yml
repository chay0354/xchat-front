version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - 'if [ -n "$REACT_APP_API_URL" ]; then echo "Has REACT_APP_API_URL YES"; else echo "Has REACT_APP_API_URL NO"; fi'
        - 'if [ -z "$REACT_APP_API_URL" ]; then echo "ERROR REACT_APP_API_URL not set"; exit 1; fi'
        - npm ci --cache .npm --prefer-offline || npm ci --cache .npm --prefer-offline --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
